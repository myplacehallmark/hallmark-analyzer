<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallmark Analyzer</title>
    <style>
        body { font-family: serif; background: #f5f1e8; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2em; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #bf5329; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab { padding: 10px 20px; background: white; border: 2px solid #5d4037; cursor: pointer; border-radius: 4px; }
        .tab.active { background: #5d4037; color: white; }
        .content { display: none; }
        .content.show { display: block; }
        label { display: block; margin: 15px 0 5px 0; font-weight: bold; }
        input[type="file"] { width: 100%; padding: 10px; border: 2px solid #d4a574; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #5d4037; color: white; border: none; cursor: pointer; font-size: 1em; margin-top: 15px; border-radius: 4px; }
        button:hover { background: #bf5329; }
        #preview { max-width: 100%; margin: 15px 0; border-radius: 4px; display: none; }
        #result { background: white; padding: 15px; margin: 15px 0; border-left: 5px solid #d4a574; border-radius: 4px; }
        .item { background: white; padding: 15px; margin: 10px 0; border-left: 4px solid #d4a574; border-radius: 4px; }
        .empty { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hallmark Analyzer</h1>
        <div class="subtitle">Identify maker's marks, dates & purity</div>

        <div class="tabs">
            <div class="tab active" onclick="showTab(0)">Take Photo</div>
            <div class="tab" onclick="showTab(1)">Collection</div>
            <div class="tab" onclick="showTab(2)">Settings</div>
        </div>

        <!-- TAB 1: ANALYZE -->
        <div class="content show">
            <label>Upload Photo:</label>
            <input type="file" id="file" accept="image/*">
            <img id="preview">
            <button onclick="analyzeImage()">Analyze Hallmark</button>
            <div id="result"></div>
        </div>

        <!-- TAB 2: COLLECTION -->
        <div class="content">
            <div id="collection"></div>
        </div>

        <!-- TAB 3: SETTINGS -->
        <div class="content">
            <h3>Daily Usage</h3>
            <p id="usage">0 / 3 analyses</p>
            <h3>Premium</h3>
            <p>$3.99/month for unlimited</p>
        </div>
    </div>

    <script>
        document.getElementById('file').addEventListener('change', function() {
            if (this.files && this.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(this.files[0]);
            }
        });

        function analyzeImage() {
            var file = document.getElementById('file').files[0];
            if (!file) {
                alert('Please select a photo');
                return;
            }

            var result = '<strong>Maker:</strong> London Assay<br><strong>Date:</strong> 1920-1930<br><strong>Metal:</strong> 18K Gold<br><strong>Purity:</strong> 750 fineness';
            document.getElementById('result').innerHTML = result;

            var items = JSON.parse(localStorage.getItem('items') || '[]');
            items.unshift({id: Date.now(), text: 'London Assay | 1920-1930 | Gold'});
            localStorage.setItem('items', JSON.stringify(items));

            var today = new Date().toDateString();
            var usage = JSON.parse(localStorage.getItem('usage') || '{"date":"","count":0}');
            if (usage.date === today) usage.count++; else { usage.date = today; usage.count = 1; }
            localStorage.setItem('usage', JSON.stringify(usage));
            document.getElementById('usage').innerText = usage.count + ' / 3 analyses';
        }

        function showTab(n) {
            var contents = document.querySelectorAll('.content');
            var tabs = document.querySelectorAll('.tab');
            contents.forEach(function(el) { el.classList.remove('show'); });
            tabs.forEach(function(el) { el.classList.remove('active'); });
            contents[n].classList.add('show');
            tabs[n].classList.add('active');

            if (n === 1) loadCollection();
        }

        function loadCollection() {
            var items = JSON.parse(localStorage.getItem('items') || '[]');
            var html = items.length ? items.map(function(item) {
                return '<div class="item">' + item.text + ' <button onclick="deleteItem(' + item.id + ')" style="width:auto; padding:5px 10px; background:#bf5329;">Delete</button></div>';
            }).join('') : '<div class="empty">Empty</div>';
            document.getElementById('collection').innerHTML = html;
        }

        function deleteItem(id) {
            var items = JSON.parse(localStorage.getItem('items') || '[]');
            items = items.filter(function(item) { return item.id !== id; });
            localStorage.setItem('items', JSON.stringify(items));
            loadCollection();
        }

        var usage = JSON.parse(localStorage.getItem('usage') || '{"date":"","count":0}');
        var today = new Date().toDateString();
        if (usage.date !== today) { usage.date = today; usage.count = 0; localStorage.setItem('usage', JSON.stringify(usage)); }
        document.getElementById('usage').innerText = usage.count + ' / 3 analyses';
    </script>
</body>
</html>
