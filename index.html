<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallmark Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: serif;
            background: #f5f1e8;
            color: #3e2723;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        header { text-align: center; padding: 20px 0; border-bottom: 3px solid #d4a574; margin-bottom: 20px; }
        h1 { font-size: 2em; margin-bottom: 5px; }
        .tagline { color: #bf5329; margin-bottom: 10px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 10px 15px; border: 2px solid #5d4037; background: #f5f1e8; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #5d4037; color: #efe7da; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        label { display: block; margin: 15px 0 5px 0; font-weight: bold; }
        input[type="file"] { width: 100%; padding: 10px; border: 2px solid #d4a574; border-radius: 4px; }

        button { padding: 10px 20px; background: #5d4037; color: #efe7da; border: none; cursor: pointer; border-radius: 4px; font-size: 1em; }
        button:hover { background: #bf5329; }

        .btn-full { width: 100%; margin-top: 15px; }

        img { max-width: 100%; margin: 15px 0; border-radius: 4px; border: 2px solid #d4a574; }

        .result { background: #f5f1e8; border-left: 5px solid #d4a574; padding: 15px; margin: 15px 0; border-radius: 4px; }
        .item { background: #f5f1e8; padding: 15px; margin: 10px 0; border-left: 4px solid #d4a574; border-radius: 4px; }
        .empty { text-align: center; padding: 40px; color: #5d4037; }

        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hallmark Analyzer</h1>
            <div class="tagline">Identify maker's marks, dates & purity</div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('analyze')">Take Photograph</button>
            <button class="tab-btn" onclick="switchTab('collection')">Collection</button>
            <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
        </div>

        <!-- ANALYZE TAB -->
        <div id="analyze" class="tab-content active">
            <label>Upload Hallmark Photo</label>
            <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto()">
            <img id="preview" style="display: none;">
            
            <button class="btn-full" onclick="analyzePhoto()">Analyze Hallmark</button>
            
            <div id="result"></div>
        </div>

        <!-- COLLECTION TAB -->
        <div id="collection" class="tab-content">
            <div id="collectionContent"></div>
        </div>

        <!-- SETTINGS TAB -->
        <div id="settings" class="tab-content">
            <div class="item">
                <h3>Daily Usage</h3>
                <p id="usageText">0 / 3 analyses used today</p>
            </div>
            <div class="item">
                <h3>Premium</h3>
                <p>$3.99/month for unlimited analyses</p>
                <button style="width: 100%; margin-top: 10px; background: #bf5329;">Upgrade</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'collection') loadCollection();
        }

        function previewPhoto() {
            const input = document.getElementById('photoInput');
            const preview = document.getElementById('preview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function analyzePhoto() {
            const fileInput = document.getElementById('photoInput');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files || !fileInput.files[0]) {
                resultDiv.innerHTML = '<div class="error">Please select a photo first</div>';
                return;
            }

            const demoResult = `
                <div class="result">
                    <strong>Maker/Assay Mark:</strong> London Assay Office<br><br>
                    <strong>Date:</strong> 1920-1930<br><br>
                    <strong>Metal Type:</strong> Gold<br><br>
                    <strong>Purity:</strong> 18 Carat (750 fineness)<br><br>
                    <strong>Features:</strong> Lion passant, Crown, Date letter<br><br>
                    <strong>Location:</strong> United Kingdom
                </div>
            `;

            resultDiv.innerHTML = demoResult;

            let collection = JSON.parse(localStorage.getItem('hallmarkCollection') || '[]');
            collection.unshift({
                id: Date.now(),
                date: new Date().toLocaleString(),
                analysis: 'London Assay Office | 1920-1930 | 18 Carat Gold'
            });
            localStorage.setItem('hallmarkCollection', JSON.stringify(collection));

            const today = new Date().toDateString();
            let usage = JSON.parse(localStorage.getItem('hallmarkUsage') || '{"date":"","count":0}');
            if (usage.date === today) {
                usage.count++;
            } else {
                usage.date = today;
                usage.count = 1;
            }
            localStorage.setItem('hallmarkUsage', JSON.stringify(usage));
        }

        function loadCollection() {
            const collection = JSON.parse(localStorage.getItem('hallmarkCollection') || '[]');
            const contentDiv = document.getElementById('collectionContent');

            if (collection.length === 0) {
                contentDiv.innerHTML = '<div class="empty">Your collection is empty</div>';
                return;
            }

            contentDiv.innerHTML = collection.map(item => `
                <div class="item">
                    <div style="font-size: 0.9em; color: #5d4037; margin-bottom: 8px;">${item.date}</div>
                    <div>${item.analysis}</div>
                    <button onclick="deleteItem(${item.id})" style="margin-top: 10px; background: #bf5329;">Delete</button>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            let collection = JSON.parse(localStorage.getItem('hallmarkCollection') || '[]');
            collection = collection.filter(item => item.id !== id);
            localStorage.setItem('hallmarkCollection', JSON.stringify(collection));
            loadCollection();
        }

        window.onload = function() {
            const today = new Date().toDateString();
            let usage = JSON.parse(localStorage.getItem('hallmarkUsage') || '{"date":"","count":0}');
            
            if (usage.date !== today) {
                usage.date = today;
                usage.count = 0;
                localStorage.setItem('hallmarkUsage', JSON.stringify(usage));
            }
            
            document.getElementById('usageText').textContent = usage.count + ' / 3 analyses used today';
        };
    </script>
</body>
</html>
