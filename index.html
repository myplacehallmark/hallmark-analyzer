<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallmark Analyzer</title>
    <style>
        body { font-family: serif; background: #f5f1e8; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2em; }
        .tabs { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .tab { padding: 10px 20px; background: white; border: 2px solid #5d4037; cursor: pointer; border-radius: 4px; }
        .tab.active { background: #5d4037; color: white; }
        .content { display: none; }
        .content.active { display: block; }
        input[type="file"] { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #d4a574; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #5d4037; color: white; border: none; cursor: pointer; margin: 10px 0; border-radius: 4px; }
        button:hover { background: #bf5329; }
        img { max-width: 100%; margin: 10px 0; display: none; }
        .result { background: white; padding: 15px; margin: 15px 0; border-left: 5px solid #d4a574; }
        .item { background: white; padding: 10px; margin: 10px 0; border-left: 4px solid #d4a574; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hallmark Analyzer</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="tab(0)">Upload</div>
            <div class="tab" onclick="tab(1)">Collection</div>
        </div>

        <div id="tab0" class="content active">
            <input type="file" id="file" accept="image/*" onchange="show()">
            <img id="preview">
            <button onclick="analyze()">Analyze</button>
            <div id="result"></div>
        </div>

        <div id="tab1" class="content">
            <div id="collection"></div>
        </div>
    </div>

    <script>
        function tab(n) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab'+n).classList.add('active');
            event.target.classList.add('active');
            if (n === 1) load();
        }

        function show() {
            var file = document.getElementById('file').files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function analyze() {
            if (!document.getElementById('file').files[0]) {
                alert('Select a photo');
                return;
            }

            var result = '<div class="result"><strong>Maker:</strong> London Assay Office<br><strong>Date:</strong> 1920-1930<br><strong>Metal:</strong> Gold<br><strong>Purity:</strong> 18 Carat<br><strong>Features:</strong> Lion, Crown, Date letter<br><strong>Location:</strong> UK</div>';
            document.getElementById('result').innerHTML = result;

            var items = JSON.parse(localStorage.getItem('items') || '[]');
            items.unshift({ id: Date.now(), text: 'London Assay | 1920-1930 | Gold' });
            localStorage.setItem('items', JSON.stringify(items));
        }

        function load() {
            var items = JSON.parse(localStorage.getItem('items') || '[]');
            var html = items.length ? items.map(item => '<div class="item">' + item.text + '<br><button onclick="del(' + item.id + ')" style="width:auto; padding:5px 10px; background:#bf5329;">Delete</button></div>').join('') : '<p>Empty</p>';
            document.getElementById('collection').innerHTML = html;
        }

        function del(id) {
            var items = JSON.parse(localStorage.getItem('items') || '[]');
            items = items.filter(item => item.id !== id);
            localStorage.setItem('items', JSON.stringify(items));
            load();
        }
    </script>
</body>
</html>
